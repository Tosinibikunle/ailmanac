version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docusaurus:
        patterns:
          - "@docusaurus/*"
          - "docusaurus*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
