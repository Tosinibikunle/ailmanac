name: "🆕 Upstream change"
description: Anthropic shipped or changed something we should reflect.
labels: [upstream-change, needs-verification]
body:
  - type: textarea
    id: change
    attributes:
      label: What changed?
      description: New model, renamed flag, new feature, deprecation, price change, etc.
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Official source link
      placeholder: https://docs.anthropic.com/...
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Pages likely affected
      description: e.g. /docs/whats-new/models-and-pricing, data/models.json
