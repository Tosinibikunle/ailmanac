name: "✨ New page / topic"
description: Propose a page that's missing (many already exist as planned stubs).
labels: [content, help wanted]
body:
  - type: input
    id: title
    attributes:
      label: Proposed page title
    validations:
      required: true
  - type: dropdown
    id: section
    attributes:
      label: Which section?
      options:
        - Start Here
        - AI Foundations
        - Prompting
        - Claude.ai & Apps
        - Claude Code
        - Claude API & Building
        - Playbooks
        - Walkthroughs
        - Templates & Recipes
        - Security & Responsible Use
        - What's New
        - Contribute
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Level
      options: [beginner, intermediate, advanced, all]
    validations:
      required: true
  - type: textarea
    id: outline
    attributes:
      label: What should it cover?
      description: A few bullets on the key points. Bonus: are you offering to write it?
    validations:
      required: true
