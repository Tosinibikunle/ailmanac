name: "📝 Content fix"
description: Report an error, outdated fact, or unclear explanation on a page.
labels: [content]
body:
  - type: input
    id: page
    attributes:
      label: Which page?
      placeholder: e.g. /docs/api/choosing-a-model
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong?
      description: Quote the text and explain the error or confusion.
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested fix (optional)
      description: How should it read instead? Link the official source if it's a factual correction.
  - type: checkboxes
    id: confirm
    attributes:
      label: Before submitting
      options:
        - label: I checked this isn't already reported.
        - label: For factual claims, I'm citing the official source where possible.
